name: Deploy Web (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Vercel production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: web
    env:
      # All three secrets must be configured in
      # Settings → Secrets and variables → Actions:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # The Vite build needs the public Supabase config baked in.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # We use the Vercel CLI directly instead of a third-party action so the
      # behaviour is reproducible and we can run `vercel build --prebuilt`
      # locally if needed.
      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build with Vercel
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" 2>&1 | tail -n1)
          echo "Deployed to: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
