name: EAS Preview Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/eas-preview.yml'

concurrency:
  group: eas-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS preview (Android + iOS)
    runs-on: ubuntu-latest
    # Forks won't have access to the EAS token — only run for PRs from the
    # same repo. Otherwise the build will fail with a confusing auth error.
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: mobile
    permissions:
      contents: read
      pull-requests: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Build preview (Android + iOS, non-interactive)
        id: build
        run: |
          # `--non-interactive --no-wait` returns immediately with build URLs
          # while the actual build runs on EAS infra. Output is captured as
          # JSON so we can post links back to the PR.
          eas build \
            --profile preview \
            --platform all \
            --non-interactive \
            --no-wait \
            --json \
            > build-output.json
          cat build-output.json

      - name: Post EAS preview links to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const raw = fs.readFileSync(
              path.join('mobile', 'build-output.json'),
              'utf8',
            );
            const builds = JSON.parse(raw);
            const rows = builds
              .map((b) => {
                const platform = b.platform === 'IOS' ? 'iOS' : 'Android';
                const url = b.buildDetailsPageUrl || b.artifacts?.buildUrl || '(pending)';
                return `| ${platform} | ${b.status} | [Open build](${url}) |`;
              })
              .join('\n');
            const body = `### Expo EAS preview build started

| Platform | Status | Link |
| --- | --- | --- |
${rows}

Builds will appear in the Expo dashboard. Install with **Expo Go** is _not_ supported for preview builds — use the EAS install link once the build finishes.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
